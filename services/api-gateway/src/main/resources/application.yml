server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    gateway.access: INFO

spring:
  application:
    name: api-gateway

  profiles:
    default: local

  lifecycle:
    timeout-per-shutdown-phase: 10s

  cloud:
    gateway:
      server:
        webflux:
          metrics:
            enabled: true
          path-tags:
              enabled: false
          httpclient:
            connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
            response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:15s}
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers, RETAIN_FIRST
            - DedupeResponseHeader=Vary, RETAIN_UNIQUE
          routes:
            # =========================================================
            # Auth Service
            # External: /api/auth/**
            # Downstream: /auth/**
            # =========================================================
            - id: auth-service-route
              uri: ${app.services.auth-url}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            # =========================================================
            # Event Service
            # =========================================================
            - id: event-service-public-route
              uri: ${app.services.event-url}
              predicates:
                - Path=/api/concerts/**

            - id: event-service-admin-route
              uri: ${app.services.event-url}
              predicates:
                - Path=/api/admin/concerts/**

            # =========================================================
            # Inventory Service
            # =========================================================
            - id: inventory-service-route
              uri: ${app.services.inventory-url}
              predicates:
                - Path=/api/inventory/**

            # =========================================================
            # Order Service
            # External: /api/orders/**
            # Downstream: /orders/**
            # =========================================================
            - id: order-service-route
              uri: ${app.services.order-url}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1

            # External: /api/users/me/orders
            # Downstream: /users/me/orders
            - id: order-service-my-orders-route
              uri: ${app.services.order-url}
              predicates:
                - Path=/api/users/me/orders
              filters:
                - StripPrefix=1

            # =========================================================
            # Payment Service
            # =========================================================
            - id: payment-service-route
              uri: ${app.services.payment-url}
              predicates:
                - Path=/api/payments/**

            - id: payment-service-admin-route
              uri: ${app.services.payment-url}
              predicates:
                - Path=/api/admin/payments/**

            # =========================================================
            # Ticket Service
            # =========================================================
            - id: ticket-service-route
              uri: ${app.services.ticket-url}
              predicates:
                - Path=/api/tickets/**

            # =========================================================
            # Check-in Service
            # =========================================================
            - id: checkin-service-route
              uri: ${app.services.checkin-url}
              predicates:
                - Path=/api/checkin/**
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_CHECKIN_RESPONSE_TIMEOUT_MS:5000}

            # =========================================================
            # Notification Service
            # =========================================================
            - id: notification-service-sse-route
              uri: ${app.services.notification-url}
              predicates:
                - Path=/api/notifications/stream
                - Method=GET
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: -1

            - id: notification-service-route
              uri: ${app.services.notification-url}
              predicates:
                - Path=/api/notifications/**
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_RESPONSE_TIMEOUT_MS:15000}

            # =========================================================
            # AI Bio Service
            # =========================================================
            - id: ai-bio-upload-route
              uri: ${app.services.ai-bio-url}
              predicates:
                - Path=/api/ai-bio/concerts/*/jobs
                - Method=POST
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_UPLOAD_RESPONSE_TIMEOUT_MS:60000}

            - id: ai-bio-service-route
              uri: ${app.services.ai-bio-url}
              predicates:
                - Path=/api/ai-bio/**
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_RESPONSE_TIMEOUT_MS:15000}

            # =========================================================
            # CSV Ingestion Service
            # =========================================================
            - id: csv-ingestion-upload-route
              uri: ${app.services.csv-ingestion-url}
              predicates:
                - Path=/api/admin/csv-import
                - Method=POST
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_UPLOAD_RESPONSE_TIMEOUT_MS:60000}

            - id: csv-ingestion-service-route
              uri: ${app.services.csv-ingestion-url}
              predicates:
                - Path=/api/admin/csv-import/**
              metadata:
                connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
                response-timeout: ${GATEWAY_RESPONSE_TIMEOUT_MS:15000}

app:
  gateway:
    upload:
      ai-bio-max-request-size: ${AI_BIO_GATEWAY_MAX_REQUEST_SIZE:30MB}
      csv-max-request-size: ${CSV_GATEWAY_MAX_REQUEST_SIZE:12MB}
  security:
    jwt:
      public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
      issuer: ${JWT_ISSUER:tickefy-auth-service}
      audience: ${JWT_AUDIENCE:tickefy-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    trust-forwarded-headers: ${RATE_LIMIT_TRUST_FORWARDED_HEADERS:false}
    retry-after-seconds: ${RATE_LIMIT_RETRY_AFTER_SECONDS:1}
    default-policy:
      replenish-rate: ${RATE_LIMIT_DEFAULT_REPLENISH_RATE:20}
      burst-capacity: ${RATE_LIMIT_DEFAULT_BURST_CAPACITY:40}
      requested-tokens: 1
    auth-policy:
      replenish-rate: ${RATE_LIMIT_AUTH_REPLENISH_RATE:5}
      burst-capacity: ${RATE_LIMIT_AUTH_BURST_CAPACITY:10}
      requested-tokens: 1
    purchase-policy:
      replenish-rate: ${RATE_LIMIT_PURCHASE_REPLENISH_RATE:2}
      burst-capacity: ${RATE_LIMIT_PURCHASE_BURST_CAPACITY:4}
      requested-tokens: 1

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus
          - gateway

  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
        add-additional-paths: true
      group:
        liveness:
          include:
            - livenessState
        readiness:
          include:
            - readinessState
    gateway:
      access: read-only

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:${spring.profiles.default:local}}
    distribution:
      percentiles-histogram:
        "http.server.requests": true
        "spring.cloud.gateway.requests": true
      slo:
        "http.server.requests":
          - 100ms
          - 300ms
          - 1s
          - 3s
          - 5s
          - 15s
        "spring.cloud.gateway.requests":
          - 100ms
          - 300ms
          - 1s
          - 3s
          - 5s
          - 15s