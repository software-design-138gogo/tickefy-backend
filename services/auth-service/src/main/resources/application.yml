spring:
  application:
    name: ${SERVICE_NAME:auth-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_auth}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    issuer: tickefy-auth
    private-key: ${JWT_PRIVATE_KEY_PATH:classpath:keys/jwt-dev-private.pem}
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P7D}
  redis:
    blacklist-prefix: "tickefy:auth:token:blacklist:"
  cookie:
    access-name: ${COOKIE_ACCESS_NAME:access_token}
    refresh-name: ${COOKIE_REFRESH_NAME:refresh_token}
    refresh-path: ${COOKIE_REFRESH_PATH:/auth}
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}
  cors:
    # CSV of allowed origins for credentialed (cookie) FE requests. Blank = CORS off (gateway owns it in prod).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  security:
    bcrypt-strength: ${BCRYPT_STRENGTH:10}
  bootstrap:
    admin:
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      full-name: ${BOOTSTRAP_ADMIN_NAME:System Admin}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.auth: ${LOG_LEVEL:INFO}
