spring:
  application:
    name: ${SERVICE_NAME:checkin-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_checkin}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
    issuer: ${JWT_ISSUER:tickefy-auth}

eticket:
  service:
    url: ${ETICKET_SERVICE_URL:http://localhost:8087}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.checkin: ${LOG_LEVEL:INFO}
