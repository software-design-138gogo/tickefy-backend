spring:
  application:
    name: ${SERVICE_NAME:checkin-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_checkin}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8088}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:400}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
    issuer: ${JWT_ISSUER:tickefy-auth-service}
    audience: ${JWT_AUDIENCE:tickefy-api}
    cache-max-size: ${JWT_CACHE_MAX_SIZE:2048}
  vip:
    cache:
      ttl-min: ${VIP_CACHE_TTL_MIN:5}

eticket:
  service:
    url: ${ETICKET_SERVICE_URL:http://localhost:8087}
  http:
    connect-timeout-ms: ${ETICKET_HTTP_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ETICKET_HTTP_READ_TIMEOUT_MS:5000}
    executor-threads: ${ETICKET_HTTP_EXECUTOR_THREADS:256}

csv:
  service:
    url: ${CSV_SERVICE_URL:http://localhost:8090}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.checkin: ${LOG_LEVEL:INFO}
