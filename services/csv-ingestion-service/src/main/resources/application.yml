spring:
  application:
    name: ${SERVICE_NAME:csv-ingestion-service}
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:csv_ingestion_service}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:csv_ingestion_service}
    default-schema: ${DB_SCHEMA:csv_ingestion_service}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      event-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - com.tickefy.csvingestion.modules.csvimport.client.EventUnavailableException
      inventory-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 1
        record-exceptions:
          - com.tickefy.csvingestion.modules.csvimport.client.InventoryUnavailableException

app:
  database:
    schema: ${DB_SCHEMA:csv_ingestion_service}
  jwt:
    issuer: ${JWT_ISSUER:tickefy-auth-service}
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
  event:
    base-url: ${EVENT_SERVICE_BASE_URL:http://event-service:8080}
  inventory:
    base-url: ${INVENTORY_SERVICE_BASE_URL:http://inventory-service:8080}
  csv:
    batch-size: ${CSV_BATCH_SIZE:1000}
    error-threshold: ${CSV_ERROR_THRESHOLD:0.5}
    worker:
      auto-trigger: ${CSV_WORKER_AUTO_TRIGGER:true}
  object-storage:
    endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${OBJECT_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${OBJECT_STORAGE_SECRET_KEY:minioadmin}
    region: ${OBJECT_STORAGE_REGION:us-east-1}
    bucket: ${OBJECT_STORAGE_BUCKET:tickefy-csv}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.csvingestion: ${LOG_LEVEL:INFO}
