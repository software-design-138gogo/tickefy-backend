spring:
  datasource:
    url: jdbc:h2:mem:csv_ingestion_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

app:
  database:
    schema: public
  csv:
    worker:
      auto-trigger: false
    reaper:
      enabled: false   # §6.12: stuck-reaper @Scheduled OFF in tests (reaper IT calls reapStuck() directly)
  messaging:
    outbox:
      enabled: false   # §6.12: drainer OFF in tests (publisher IT overrides to true)

management:
  health:
    rabbit:
      enabled: false   # no broker in profile-test context (amqp dep added in 5b) -> avoid /health 503
