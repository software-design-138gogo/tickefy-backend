spring:
  output:
    ansi:
      enabled: always
  application:
    name: ${SERVICE_NAME:e-ticket-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_eticket}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: ${SERVER_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
    issuer: ${JWT_ISSUER:tickefy-auth}
  messaging:
    exchange: ${MESSAGING_EXCHANGE:tickefy.exchange}
    queue:
      order-paid: ${QUEUE_ORDER_PAID:ticket-service.order-paid.queue}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.eticket: ${LOG_LEVEL:INFO}
