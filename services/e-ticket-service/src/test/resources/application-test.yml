spring:
  datasource:
    url: jdbc:h2:mem:eticket_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 5672

app:
  database:
    schema: public
  jwt:
    public-key: classpath:keys/jwt-dev-public.pem
    issuer: tickefy-auth-service
    audience: tickefy-api
  messaging:
    exchange: tickefy.exchange
    listener-auto-startup: false
    queue:
      order-paid: ticket-service.order-paid.queue
