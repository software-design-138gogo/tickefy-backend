spring:
  application:
    name: ${SERVICE_NAME:event-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_event}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:tickefy-assets}
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:tickefy.events}
  outbox:
    fixed-delay: 5000

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.event: ${LOG_LEVEL:INFO}
