spring:
  application:
    name: ${SERVICE_NAME:event-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_event}?options=-c%20search_path%3D${DB_SCHEMA:public}%2Cpublic%20-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tickefy}
    password: ${RABBITMQ_PASSWORD:change_me}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  dev:
    seed:
      enabled: ${APP_DEV_SEED_ENABLED:false}  # dev-only E2E anchor seeder; prod image leaves unset -> off
  security:
    jwt:
      issuer: ${JWT_ISSUER:tickefy-auth-service}
      audience: ${JWT_AUDIENCE:tickefy-api}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
  database:
    schema: ${DB_SCHEMA:public}
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:tickefy-assets}
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:tickefy.exchange}
    dlx: ${RABBITMQ_DLX:tickefy.dlx}
    concert-introduction-queue: ${CONCERT_INTRODUCTION_QUEUE:event-service.concert-introduction-generated.queue}
    concert-introduction-dlq: ${CONCERT_INTRODUCTION_DLQ:event-service.concert-introduction-generated.queue.dlq}
  outbox:
    fixed-delay: 5000

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.event: ${LOG_LEVEL:INFO}

spring.data.redis.host: ${REDIS_HOST:localhost}
spring.data.redis.port: ${REDIS_PORT:6379}
spring.data.redis.connect-timeout: 500ms
spring.data.redis.timeout: 500ms

app.cache.concert-detail.l1-max-size: 10000
app.cache.concert-detail.l1-expire-minutes: 5
app.cache.concert-detail.l2-ttl-hours: 24
app.cache.concert-detail.l2-jitter-minutes: 120
app.cache.concert-list.l2-ttl-minutes: 60
app.cache.concert-list.l2-jitter-minutes: 10
app.cache.null-result-ttl-seconds: 60
app.cache.stampede.lock-wait-ms: 50
app.cache.stampede.max-retries: 40
app.cache.invalidation-channel: cache:invalidation:concerts
