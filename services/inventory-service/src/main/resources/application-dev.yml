spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8083

app:
  dev:
    seed:
      enabled: true  # local `mvnw spring-boot:run` (dev profile) -> seed FE anchor

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.inventory.modules.inventory: DEBUG
    org.springframework.security: INFO
