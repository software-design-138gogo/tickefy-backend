spring:
  application:
    name: ${SERVICE_NAME:inventory-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_inventory}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  dev:
    seed:
      enabled: ${APP_DEV_SEED_ENABLED:false}  # dev-only inventory seeder; prod image leaves unset -> off
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    issuer: tickefy-auth
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
  redis:
    stock-key-prefix: "tickefy:inventory:available:"
    user-limit-key-prefix: "tickefy:inventory:user-limit:"
    meta-key-prefix: "tickefy:inventory:meta:"
  inventory:
    reservation-ttl: ${RESERVATION_TTL:PT15M}
    validate-concert: ${VALIDATE_CONCERT:false}
    lua:
      reserve-script: classpath:lua/reserve.lua
  messaging:
    exchange: ${MESSAGING_EXCHANGE:tickefy.exchange}
    dlx: ${MESSAGING_DLX:tickefy.dlx}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.inventory: ${LOG_LEVEL:INFO}
