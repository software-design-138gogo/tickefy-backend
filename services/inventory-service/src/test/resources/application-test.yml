spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    issuer: tickefy-auth-service
    public-key: classpath:keys/jwt-dev-public.pem
  redis:
    stock-key-prefix: "tickefy:inventory:available:"
    user-limit-key-prefix: "tickefy:inventory:user-limit:"
    meta-key-prefix: "tickefy:inventory:meta:"
  inventory:
    reservation-ttl: PT15M
    validate-concert: false
    lua:
      reserve-script: classpath:lua/reserve.lua

logging:
  level:
    root: WARN
    com.tickefy.inventory: DEBUG
    org.springframework.security: WARN
