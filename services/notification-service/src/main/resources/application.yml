spring:
  application:
    name: ${SERVICE_NAME:notification-service}
  profiles:
    default: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          # Path to the RSA public key PEM used to verify JWT signatures.
          # Override via JWT_PUBLIC_KEY_LOCATION env var in production.
          public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_notification}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:tickefy}
    password: ${RABBITMQ_PASSWORD:change_me}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000     # 1s initial wait
          multiplier: 3.0            # exponential: 1s -> 3s -> 9s
          max-interval: 10000        # capped at 10s
          max-attempts: 3
        default-requeue-rejected: false  # failed messages go to DLQ, not re-queued

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  mail:
    from: ${MAIL_FROM:noreply@tickefy.vn}
    from-name: ${MAIL_FROM_NAME:Tickefy}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.notification: ${LOG_LEVEL:INFO}
