spring:
  application:
    name: ${SERVICE_NAME:order-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy_order}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:public}
  jwt:
    issuer: ${JWT_ISSUER:tickefy-auth-service}
    public-key: ${JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-dev-public.pem}
  inventory:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
    reservations-path: /api/inventory/reservations
  payment:
    base-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
    stub: ${PAYMENT_STUB:true}
  order:
    expiry-ttl: ${ORDER_EXPIRY_TTL:PT15M}
  messaging:
    exchange: ${MESSAGING_EXCHANGE:tickefy.exchange}
    dlx: ${MESSAGING_DLX:tickefy.dlx}
    outbox-poll-delay: ${OUTBOX_POLL_DELAY_MS:3000}
  dev:
    payment-sim:
      enabled: ${DEV_PAYMENT_SIM_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.order: ${LOG_LEVEL:INFO}
