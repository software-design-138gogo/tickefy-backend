spring:
  datasource:
    # URL is overridden at runtime by @DynamicPropertySource in BaseIntegrationTest
    url: jdbc:postgresql://localhost:5432/order_test
    username: order_test
    password: order_test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        format_sql: false
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    locations: classpath:db/migration

app:
  jwt:
    issuer: tickefy-auth-service
    public-key: classpath:keys/jwt-dev-public.pem
  inventory:
    base-url: http://localhost:9999
  payment:
    stub: true
  refund:
    worker:
      enabled: false
  database:
    schema: public
  messaging:
    listener-auto-startup: false
    outbox:
      enabled: false

management:
  health:
    rabbit:
      enabled: false   # §6.12: no broker connection in IT (listener-auto-startup off) -> avoid /health ACCESS_REFUSED

logging:
  level:
    root: WARN
    com.tickefy.order: DEBUG
