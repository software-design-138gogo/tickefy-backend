spring:
  datasource:
    # URL is overridden at runtime by @DynamicPropertySource in BaseIntegrationTest
    url: jdbc:postgresql://localhost:5432/order_test
    username: order_test
    password: order_test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        format_sql: false
  flyway:
    enabled: true
    schemas: public
    default-schema: public
    locations: classpath:db/migration

app:
  jwt:
    issuer: tickefy-auth-service
    public-key: classpath:keys/jwt-dev-public.pem
  inventory:
    base-url: http://localhost:9999
  payment:
    stub: true
  database:
    schema: public

logging:
  level:
    root: WARN
    com.tickefy.order: DEBUG
