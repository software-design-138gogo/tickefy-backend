spring:
  application:
    name: ${SERVICE_NAME:payment-service}
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tickefy}?options=-c%20TimeZone%3D${APP_TIMEZONE:UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:payment_service}
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:UTC}
  flyway:
    enabled: true
    schemas: ${DB_SCHEMA:payment_service}
    default-schema: ${DB_SCHEMA:payment_service}
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  database:
    schema: ${DB_SCHEMA:payment_service}
  payment:
    expiry: ${PAYMENT_EXPIRY:PT15M}
    provider: MOCK_SEPAY
    callback:
      secret: ${SEPAY_WEBHOOK_SECRET:}
  messaging:
    exchange: ${APP_MESSAGING_EXCHANGE:tickefy.exchange}
    outbox-poll-delay: ${OUTBOX_POLL_DELAY:3000}
  dev:
    payment-sim:
      enabled: ${DEV_PAYMENT_SIM_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.tickefy.payment: ${LOG_LEVEL:INFO}
