spring:
  datasource:
    url: jdbc:h2:mem:payment_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

app:
  database:
    schema: public
  internal:
    token: test-internal-token
  payment:
    reconcile:
      enabled: false
  messaging:
    outbox:
      enabled: false
